- source_key: "efc_vt_2021"
  name: "UNC EFC Vermont Water and Wastewater Rates Dashboard (2021)"
  tier: "premium"
  commercial_use: true
  license: "none stated — state/federal partnership (VT DEC + EPA cooperative agreement)"

  # Access
  url: "https://dashboards.efc.sog.unc.edu/vt"
  download_url: "https://dashboards.efc.sog.unc.edu/vt"
  # Data is served via the same Topsail JSON API used by all 19 existing EFC dashboards.
  # API endpoint pattern (same as existing efc_* sources):
  # https://dashboards.efc.sog.unc.edu/api/...  (confirm exact endpoint from existing pipeline)
  format: "json_api"
  authentication: "none"

  # Scope
  states_covered: [VT]
  estimated_total_records: 182  # confirmed from EFC resource page
  estimated_incremental_pwsids: 155  # Vermont has near-zero existing commercial coverage
  has_pwsid: true  # EFC dashboards cross-reference EPA SDWIS PWSIDs
  pwsid_format: "VT1234567"
  matching_strategy: "direct_pwsid"
  data_vintage: "2021"  # "Rates as of July 1, 2021"

  # Schema
  schema:
    note: >
      Identical schema to all existing efc_{state} sources.
      Full tier structures available (fixed charge + volumetric blocks).
      Data includes water rates, wastewater rates, financial metrics.
      See existing efc_wI_2024 or any other efc_* ingest module for
      the exact field mapping — this source is a direct clone.

  # Sample records
  sample_records:
    - note: "Schema not re-extracted — identical to existing EFC sources. Use any efc_* module as reference."

  # Implementation guidance
  ingest_approach: |
    Direct clone of any existing efc_{state} ingest module.
    Steps:
    1. Point the state code / dashboard URL to "vt" / dashboards.efc.sog.unc.edu/vt
    2. Use the existing Topsail API query pattern (same endpoint structure as WI, OH, etc.)
    3. Extract all utility records with PWSIDs and rate structures
    4. Map to rate_schedules table using existing EFC field mapping
    5. Tag with source_key "efc_vt_2021" and data_vintage "2021-07-01"

    No new engineering required — this is a configuration change, not a new module.

  similar_to: "efc_wi_2024"  # or any existing efc_* module
  key_differences:
    - "State code: VT"
    - "Dashboard URL: dashboards.efc.sog.unc.edu/vt"
    - "Data vintage: July 2021 (older than most EFC states)"
    - "Funded by Vermont DEC, not EFC core grant"
  estimated_effort: "1-2 hours"
  data_quality_notes:
    - "Data is from July 2021 — ~4 years stale. Rates will be understated vs. current."
    - "182 utilities covers 'nearly all' VT utilities per EFC — good coverage"
    - "Vermont has both municipal and private (PUC-regulated) water utilities — both should be in the EFC survey"
    - "No known update to the dashboard since August 2021 — this is the only available vintage"
