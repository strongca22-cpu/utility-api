# config/iou_subsidiaries.yaml
# Investor-Owned Water Utility Subsidiary Database
# Purpose: Map subsidiary names to parent companies and rate page URLs
#          for SDWIS PWSID matching in the water utility URL discovery pipeline
#
# Sources: SEC 10-K Exhibit 21 filings, company websites, Wikipedia, press releases
# Last updated: 2026-03-25
#
# Confidence levels:
#   confirmed  — from SEC Exhibit 21 filing or official company website
#   likely     — from press releases, news articles about acquisitions
#   unverified — from indirect sources or inferred
#
# NOTE: This file focuses on "named subsidiaries" — local operating names that
#       do NOT follow the parent's standard naming pattern (e.g., "{State} American Water").
#       Pattern-matched subsidiaries are already captured by the Sprint 15 mapper.
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ URL RESTRUCTURE NOTICE (2026-03-25)                                        │
# │                                                                            │
# │ American Water consolidated its web presence from per-state domains         │
# │ ({state_lower}amwater.com) to subdirectories on amwater.com.               │
# │                                                                            │
# │ OLD pattern: https://www.{state_lower}amwater.com/customer-service/rates   │
# │ NEW pattern: https://amwater.com/{state_abbrev_lower}aw/                   │
# │                                                                            │
# │ State abbrev codes: CA→caaw, HI→hiaw, IL→ilaw, IN→inaw, IA→iaaw,          │
# │   KY→kyaw, MD→mdaw, MO→moaw, NJ→njaw, PA→paaw, TN→tnaw, VA→vaaw,        │
# │   WV→wvaw                                                                 │
# │                                                                            │
# │ Rate page paths vary per state — not a single template. Known paths:       │
# │   NJ: /Customer-Service-Billing/Your-Water-and-Wastewater-Rates/           │
# │   MO: /Customer-Service-Billing/Water-and-Wastewater-Rates/                │
# │   IN: /customer-service-billing/your-water-rates                           │
# │   IA: /Customer-Service-Billing/Your-Water-and-Wastewater-Rates            │
# │   CA: /Customer-Service-Billing/Rates/ (then division-specific subpages)   │
# │                                                                            │
# │ Old domains (e.g., newjerseyamwater.com) may still redirect but should     │
# │ NOT be used as canonical URLs. Sprint 15 mapper templates must be updated. │
# │                                                                            │
# │ The subsidiary NAMES below remain valid — only URLs need regeneration.     │
# └─────────────────────────────────────────────────────────────────────────────┘

# =============================================================================
# TIER 1: LARGEST IOUs — RESEARCHED THOROUGHLY
# =============================================================================

american_water:
  parent: "American Water Works Company, Inc."
  ticker: "AWK"
  sec_cik: "0001410636"
  website: "https://amwater.com"
  notes: |
    Largest US investor-owned water utility. Operates in 14 states.
    Agreed to acquire Essential Utilities in Oct 2025 (expected close Q1 2027).
    Agreed to acquire Nexus Water Group assets in 8 states (May 2025).

  # Pattern subsidiaries — already captured by Sprint 15 mapper
  # URL TEMPLATE NEEDS UPDATE: was {state_lower}amwater.com, now amwater.com/{abbrev}aw/
  pattern_subsidiaries:
    - pattern: "{state} American Water"
      states: [CA, HI, IL, IN, IA, KY, MD, MO, NJ, PA, TN, VA, WV]
      url_template_OLD: "https://www.{state_lower}amwater.com/customer-service/rates"
      url_template_NEW: "https://amwater.com/{state_abbrev_lower}aw/"
      rate_page_note: "Rate page path varies per state; see notice above"
      notes: "TN American Water also serves part of northern Georgia"

  # Named subsidiaries — local names that DON'T match the "{State} American Water" pattern
