investigate_further:
  - name: "Duke 787-community identified dataset (via author contact)"
    contact: "Lauren Patterson, lauren.patterson@duke.edu"
    paper_url: "https://journals.plos.org/water/article?id=10.1371/journal.pwat.0000123"
    dashboard_url: "https://nicholasinstitute.duke.edu/water-affordability/water-affordability-united-states/"
    status: "NOT AVAILABLE as bulk download. PLOS S1 Data is anonymized. GitHub not updated."
    action: |
      Email Patterson with free-tier distribution proposal:
      "We're building a public geospatial water rate database. We'd like to include
      your 787-community national dataset as a free, publicly accessible layer with
      full attribution — formatted for GIS use but always available without charge.
      Our premium product covers 6,000+ additional utilities from EFC dashboards and
      state sources, but the Duke layer would be separate and free."

      This approach satisfies CC BY-NC-ND: the data is distributed for free (NC satisfied),
      original values preserved (ND satisfied), with full attribution (BY satisfied).
      Premium product explicitly excludes Duke data from behind paywall.
    license_concern: "Underlying data is CC BY-NC-ND 4.0 per Duke's standard terms."
    potential_value: |
      ~787 utilities across ALL 50 states. Covers ~16 utilities per state on average.
      For the 10 states already in the GitHub repo, adds nothing (GitHub has more utilities).
      For ~40 other states, this would be the ONLY Duke source.
      Highest value for gap states: NY, MI, IN, CO, MN, VA, KY, TN, LA, OK, MD, etc.

  - name: "Duke OTC licensing for commercial use"
