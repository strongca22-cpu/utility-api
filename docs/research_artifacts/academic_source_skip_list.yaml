    status: "Not yet contacted."
    action: |
      If the free-tier distribution model is adopted (Duke data served free with
      attribution, premium product excludes Duke behind paywall), formal OTC
      licensing may not be needed. The free-tier model satisfies CC BY-NC-ND.
      Contact OTC only if a tighter integration (Duke data in premium bundle) is desired.
    potential_value: "Could unlock 787+ utilities across all 50 states for any distribution model."
