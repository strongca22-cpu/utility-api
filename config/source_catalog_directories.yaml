- source_key: va_vdh_waterworks_listing
  display_name: "Virginia DOH Waterworks and Owners Listing"
  source_type: state_directory
  states_covered: [VA]
  url: "https://www.vdh.virginia.gov/drinking-water/information-for-consumers/listing-of-waterworks-and-owners/"
  format: pdf  # Large PDF, ~342 pages
  has_pwsid: true  # 7-digit format, needs VA prefix
  has_website_url: false
  has_rate_info: false
  has_contact_info: true  # owner name, address, email for some entries
  estimated_cws_count: 2800
  last_checked: "2026-03-25"
  notes: >
    PDF listing updated ~annually (latest: 12/2025).
    Includes: PWSID (7-digit), system name, operator category, city/county,
    system type (C/NTNC/NC), service connections, population, source,
    owner type, owner name/address, admin contact name/address/email.
    Some entries have email addresses from which domain can be extracted.
    Could be parsed with PDF extraction tools.
    Federal PWSID = 'VA' + 7-digit state ID.

