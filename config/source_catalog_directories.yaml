# Source Catalog: Water Utility Directory Sources
# Generated: 2026-03-25
# Purpose: Documents all investigated federal/state/aggregator directory sources
# Key finding: NO source contains utility website URLs - all are compliance/contact focused

# =============================================================================
# TIER 1: FEDERAL SOURCES
# =============================================================================

- source_key: epa_echo_sdwa_download
  display_name: "EPA ECHO SDWA Bulk Data Download"
  source_type: federal_bulk_download
  states_covered: [ALL]
  url: "https://echo.epa.gov/tools/data-downloads"
  format: csv_download  # Weekly-refreshed ZIP with multiple CSV files
  has_pwsid: true
  has_website_url: false
  has_rate_info: false
  has_contact_info: true  # admin name, phone, fax, address
  has_email: false  # not in bulk download
  estimated_cws_count: 50000
  last_checked: "2026-03-25"
  notes: >
    Primary federal data source. SDWA_PUB_WATER_SYSTEMS.csv contains all PWS.
    Filter PWS_TYPE_CODE='CWS' and PWS_ACTIVITY_CODE='A' for active community systems.
    Includes: PWSID, PWS_NAME, ADDRESS_LINE1/2, CITY_NAME, STATE_CODE, ZIP_CODE,
    COUNTY_SERVED, POPULATION_SERVED_COUNT, SERVICE_CONNECTIONS_COUNT, ADMIN_NAME,
    PHONE_NUMBER, ALT_PHONE_NUMBER, FAX_NUMBER, GW_SW_CODE, PWS_TYPE_CODE.
    NO WEBSITE URL FIELD EXISTS IN SDWIS DATA MODEL.
    Updated weekly. Too large for Excel; use database or Python.

- source_key: epa_envirofacts_sdwis_api
  display_name: "EPA Envirofacts SDWIS REST API"
  source_type: federal_api
  states_covered: [ALL]
  url: "https://data.epa.gov/efservice/sdwis.water_system/"
  format: api  # REST API returning JSON/CSV/XML
  has_pwsid: true
  has_website_url: false
  has_rate_info: false
  has_contact_info: true
  estimated_cws_count: 150000  # all PWS types, not just CWS
  last_checked: "2026-03-25"
  notes: >
    Queryable REST API for SDWIS tables. Supports filtering by state, county, etc.
    Example: https://data.epa.gov/efservice/sdwis.water_system/STATE_CODE/VA/rows/0:100/JSON
    Same data model as ECHO download - no website URL field.
    Useful for programmatic state-by-state extraction.
    Rate limited; paginate with rows/0:1000 syntax.

- source_key: epa_echo_sdw_rest_api
  display_name: "EPA ECHO SDW REST Services"
  source_type: federal_api
  states_covered: [ALL]
  url: "https://echodata.epa.gov/echo/sdw_rest_services.get_systems"
  format: api  # REST API with CSV download capability
  has_pwsid: true
  has_website_url: false
  has_rate_info: false
  has_contact_info: true
  estimated_cws_count: 50000
  last_checked: "2026-03-25"
  notes: >
    ECHO SDW search API. Use get_systems with state_code parameter, then get_download
    with QID for CSV export. Returns DfrUrl (EPA Detailed Facility Report URL) but NOT
    utility website URL. Use qcolumns parameter to select specific fields.
    QIDs expire after ~30 minutes.

- source_key: epa_pws_service_areas
  display_name: "EPA Public Water System Service Area Boundaries"
  source_type: federal_gis
  states_covered: [ALL]
  url: "https://www.epa.gov/ground-water-and-drinking-water/public-water-system-service-areas"
  format: arcgis  # GIS shapefile/feature service
  has_pwsid: true
  has_website_url: false
  has_rate_info: false
  has_contact_info: false
  estimated_cws_count: 50000
  last_checked: "2026-03-25"
  notes: >
    Geospatial boundaries for community water systems nationwide.
    Each polygon attributed with PWSID, name, population, connections.
    Useful for spatial analysis but no contact or URL data.
    SDWIS 2023Q4 data for universe definition.

- source_key: ewg_tap_water_database
  display_name: "EWG Tap Water Database"
  source_type: aggregator
  states_covered: [ALL]
  url: "https://www.ewg.org/tapwater/"
  format: html_profiles  # Individual pages per PWSID
  has_pwsid: true
  has_website_url: false
  has_rate_info: false
  has_contact_info: false
  estimated_cws_count: 48500
  last_checked: "2026-03-25"
  notes: >
    Water quality/contaminant focused profiles. URL pattern:
    https://www.ewg.org/tapwater/system.php?pws=XX1234567
    No API or bulk download. No utility website links.
    Contains contaminant test results from 2021-2023.
    Not useful for URL discovery but useful for quality data.

