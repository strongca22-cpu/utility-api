  has_fixed_charges: false
  estimated_utility_count: 237
  vintage: "2024-2025"
  refresh_cadence: annual
  access: free
  notes: |
    Annual survey of TX cities. 2025: 168 cities. 2024: 237 cities.
    Includes water fees by population group, residential/commercial costs.
    Results available for 2019-2025. No PWSIDs — would need city name matching.
    TX has 4,584 CWS — this covers only municipalities, not MUDs or IOUs.
    TX PUC regulates IOUs separately (Aqua TX, Texas Water Utilities/Nexus).
  ingest_difficulty: moderate
  priority: 8

