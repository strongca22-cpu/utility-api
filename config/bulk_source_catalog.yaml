# config/bulk_source_catalog.yaml
# Bulk Water Rate Data Source Catalog
# Purpose: Structured catalog of every identified bulk rate data source
# Last updated: 2026-03-25
#
# Key finding: The UNC Environmental Finance Center (EFC) has rate dashboards
# covering 24+ US states with downloadable data. The EFC page explicitly states:
# "Data displayed on the dashboard are available for download from links provided
# on the dashboard webpages." This is the single most valuable discovery.
#
# Additionally, a National Water Affordability Dashboard exists at Duke/Nicholas
# Institute covering 2,349+ utilities across 7 states with detailed rate data.
#
# The EFC blog (2017) mentions "4,493 communities across the country" in their
# database, and a 2025 blog post references a new national dashboard with
# "over 7,000 utilities."

# =============================================================================
# TIER 1: HIGHEST VALUE — MULTI-STATE / LARGE UTILITY COUNT
# =============================================================================

- source_key: "efc_national_affordability"
  display_name: "UNC EFC National Water Affordability Dashboard"
  source_type: bulk_academic
  states_covered: [MULTI]
  url: "https://efc.sog.unc.edu/dashboards/"
  download_url: null  # Check individual dashboard pages for download links
  format: html_dashboard
  has_pwsid: true
  has_rate_tiers: true
  has_bill_amounts: true
  has_fixed_charges: true
  estimated_utility_count: 7000
  vintage: "2019-2025"
  refresh_cadence: annual
  access: free
  notes: |
    The EFC states that dashboard data is available for download. The 2025 blog
    mentions a national dashboard with 7,000+ utilities. This is the SINGLE
    HIGHEST VALUE source to investigate. The EFC's 2017 blog mentions 4,493
    communities; by 2025 this has grown to 7,000+.
    
    The dashboard webpages use a custom JavaScript framework at
    dashboards.efc.sog.unc.edu. Each state dashboard may have different data
    download mechanisms — check each one individually.
    
    Key question: Is there a single bulk download of all states, or must each
    state be downloaded separately? Check the API/data endpoints.
  ingest_difficulty: moderate
  priority: 1

- source_key: "awwa_raftelis_rate_survey"
  display_name: "AWWA/Raftelis Water and Wastewater Rate Survey"
  source_type: bulk_survey
  states_covered: [MULTI]
  url: "https://www.awwa.org/data-products/rate-survey/"
  download_url: null
  format: html_dashboard  # New digital subscription platform
  has_pwsid: false  # Survey-based, uses utility names
  has_rate_tiers: true
  has_bill_amounts: true
  has_fixed_charges: true
  estimated_utility_count: 500
  vintage: "2023-2025"
  refresh_cadence: biennial  # Now every 6 months
  access: paywall  # Subscription required
  notes: |
    AWWA and Raftelis co-publish the most widely cited water rate survey.
    Redesigned to update every 6 months (was biennial). Covers ~500 utilities
    across all 50 states. New digital subscription platform launched.
    Pricing unknown but likely $500-$2,000/year for members.
    No PWSIDs — would need fuzzy name matching.
  ingest_difficulty: moderate
  priority: 10  # Lower priority due to paywall and lack of PWSIDs

