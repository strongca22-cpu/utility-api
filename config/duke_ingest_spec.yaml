# =============================================================================
# INGEST IMPLEMENTATION GUIDANCE
# =============================================================================

recommendation:
  approach: |
    1. Clone the GitHub repo (or download the data/rates_data/ directory)
    2. For each state Excel file, read both sheets (ratesMetadata + rateTable)
    3. Filter rateTable for rate_code='water' (exclude sewer/storm/septic)
    4. For each PWSID, extract:
       - Fixed charge: rows where rate_type='service_charge' AND meter_size=0.625
       - Volumetric rates: rows where rate_type starts with 'commodity_charge'
       - Tier breakpoints: value_from and value_to for commodity_charge_tier rows
    5. Calculate estimated monthly bill at standard consumption levels (5000 gal)
    6. Join with our SDWIS database on pwsid
    7. BONUS: Extract utility website URLs from ratesMetadata.website column
    
  estimated_effort: "4-6 hours"
  estimated_new_pwsids: 2034  # States not in EFC: TX+KS+PA+WA+NJ+NM
  
  priority_ingest_order:
    - TX   # 751 PWSIDs, largest gap fill
    - KS   # 438 PWSIDs, no EFC coverage
    - PA   # 332 PWSIDs, no EFC coverage
    - WA   # 246 PWSIDs, no EFC coverage
    - NJ   # 214 PWSIDs, no EFC coverage
    - NM   # 53 PWSIDs, no EFC coverage

  overlap_handling: |
    For CA, NC, CT: check if PWSIDs already exist in our database from
    EFC or eAR/OWRS sources. If so, skip or compare vintages and keep newer.

  key_implementation_notes:
    - "Excel files use 'NA' as string for missing values, not null/empty"
    - "value_to=1000000000 means unlimited (last tier)"
    - "meter_size=0.625 is standard residential 5/8 inch meter"
    - "adjustment field is a multiplier, usually 1.0"
    - "bill_frequency varies — normalize all to monthly for comparison"
    - "effective_date in rateTable is just a year (integer), not full date"
    - "effective_date in ratesMetadata is a datetime"
    - "Some formulas remain in ratesMetadata year/month/day columns — compute from effective_date"
    - "ratesMetadata.website contains utility URLs — extract these as a bonus output"
    - "The rateTable has both water AND sewer data — filter by rate_code='water' for water rates only"
    - "Python library: openpyxl (already installed in pipeline)"

  target_table: "utility.rate_schedules"
  source_key: "duke_affordability_2021"
  
  bill_calculation: |
    To calculate monthly bill at X gallons:
    1. Start with service_charge where meter_size=0.625 (or smallest available)
    2. Apply volumetric charges:
       - For commodity_charge_flat: cost × (X / vol_base)
       - For commodity_charge_tier: iterate tiers, applying each tier's rate
         to the gallons within that tier's range (value_from to value_to)
    3. Add any surcharges
    4. Multiply sewer charges by adjustment factor
    5. If bill_frequency != 'monthly', divide/multiply accordingly

# =============================================================================
# BONUS: RELATED DATASETS IN REPO
# =============================================================================

related_data_in_repo:
  sdwis_cws_systems:
    path: "data/sdwis/cws_systems.csv"
    rows: 16848
    description: "CWS systems with PWSID, name, state, population, connections, city, counties_served"
    useful_for: "Cross-reference and gap analysis"

  service_area_boundaries:
    path: "data/ (check for GeoJSON/shapefiles)"
    description: |
      The README mentions 'raw service area boundaries' in the data folder.
      These may be pulled dynamically by the R scripts from external sources
      (e.g., EPA, state GIS portals). Check the R code in rcode/ for
      boundary data source URLs.
    useful_for: "Geospatial join of rates to census tracts"

  national_dashboard_data:
    url: "https://nicholasinstitute.duke.edu/water-affordability/water-affordability-united-states/"
    description: |
      A SEPARATE nationwide dashboard covering 787 communities representing
      half the US population. This appears to be a more recent, expanded
      version. Published in PLOS Water. Check for downloadable data.
    utility_count: 787
    notes: "May have additional states beyond the 10 in the GitHub repo"
