# config/duke_ingest_spec.yaml
# Complete ingest specification for the Duke/Nicholas Institute Water Affordability Dataset
# A Claude Code session can implement from this file without further research.
#
# Last verified: 2026-03-25 (repo cloned and data inspected)

source:
  name: "Duke Nicholas Institute Water Affordability Dashboard"
  source_key: "duke_affordability_2021"
  repo_url: "https://github.com/NIEPS-Water-Program/water-affordability"
  dashboard_url: "https://nicholasinstitute.duke.edu/water-affordability/water-affordability-dashboard"
  project_url: "https://nicholasinstitute.duke.edu/water-affordability/"
  paper_doi: "http://dx.doi.org/10.1002/aws2.1260"
  zenodo_doi: "10.5281/zenodo.5156654"
  data_vintage: "2019-2021 (rates effective dates vary; most are 2020)"
  total_unique_pwsids: 3297
  states: [CA, CT, KS, NC, NJ, NM, OR, PA, TX, WA]
  
  license:
    type: "CC BY-NC-ND 4.0"
    url: "https://creativecommons.org/licenses/by-nc-nd/4.0/"
    commercial_use: false
    commercial_contact: "otcquestions@duke.edu (ref OTC File No. 7797)"
    notes: |
      NonCommercial + NoDerivatives. For commercial use, must contact
      Duke Office for Translation & Commercialization. For internal research
      and development this is fine. For a commercial product, need to either:
      (a) license from Duke, or (b) use the data to identify which PWSIDs
      to scrape directly, then scrape the primary sources for rate data.

  citation: |
    Patterson, Lauren, Martin Doyle, Aislinn McLaughlin, and Sophia Bryson. 2021.
    Water Affordability Data Repository. Nicholas Institute for Environmental Policy
    Solutions at Duke University.
    https://github.com/NIEPS-Water-Program/water-affordability

# =============================================================================
# ACCESS METHOD: Git clone → Excel files
# =============================================================================

access_method: "git_clone_xlsx"

git_clone:
  repo: "https://github.com/NIEPS-Water-Program/water-affordability.git"
  data_path: "data/rates_data/"
  files:
    - "rates_ca.xlsx"   # CA: 673 PWSIDs, 5335 rate rows
    - "rates_ct.xlsx"   # CT: 65 PWSIDs, 518 rate rows
    - "rates_ks.xlsx"   # KS: 438 PWSIDs, 5889 rate rows
    - "rates_nc.xlsx"   # NC: 516 PWSIDs, 6389 rate rows
    - "rates_nj.xlsx"   # NJ: 214 PWSIDs, 1478 rate rows
    - "rates_nm.xlsx"   # NM: 53 PWSIDs, 4917 rate rows
    - "rates_or.xlsx"   # OR: 9 PWSIDs, 480 rate rows
    - "rates_pa.xlsx"   # PA: 332 PWSIDs, 6836 rate rows
    - "rates_tx.xlsx"   # TX: 751 PWSIDs, 8509 rate rows
    - "rates_wa.xlsx"   # WA: 246 PWSIDs, 2244 rate rows
  metadata_file: "rates_metadata.xlsx"  # Column descriptions
  sdwis_reference: "data/sdwis/cws_systems.csv"  # 16,848 CWS records for joining

# =============================================================================
# DATA SCHEMA
# =============================================================================

schema:
  # Each .xlsx file has two sheets: ratesMetadata and rateTable
  
  sheet_ratesMetadata:
    description: "One row per (PWSID, service_type) combination. Contains metadata about each rate schedule."
    columns:
      pwsid:
        type: string
        format: "{SS}{7digits}"  # e.g., "NJ2004001"
        description: "EPA SDWIS PWSID — direct match to our database"
        maps_to_epa_pwsid: true
      service_area:
        type: string
        description: "Name of service area provider"
      city_name:
        type: string
        description: "Primary city(ies) covered"
      utility_name:
        type: string
        description: "Name of utility providing the service"
      effective_date:
        type: datetime
        description: "Date rates were passed"
      service_type:
        type: string
        enum: [water, sewer, septic, stormwater]
        description: "Type of service"
      website:
        type: string
        description: "URL where rate data was found — BONUS: utility website URLs!"
      notes:
        type: string
        description: "Analyst notes, assumptions"
      year:
        type: integer
        description: "Year from effective_date (formula in Excel)"
      month:
        type: integer
        description: "Month from effective_date"
      day:
        type: integer
        description: "Day from effective_date"
      last_updated:
        type: integer
        description: "Year the rates were digitized by analyst"
      min_wage:
        type: float
        description: "Local minimum wage"
      min_year:
        type: integer
        description: "Year minimum wage was in effect"

  sheet_rateTable:
    description: |
      One row per rate component. A single PWSID has MULTIPLE rows:
      - service_charge rows (fixed monthly charge, often per meter size)
      - commodity_charge_flat rows (uniform volumetric rate)
      - commodity_charge_tier rows (tiered volumetric rates with value_from/value_to)
      - surcharge rows (various)
    columns:
      pwsid:
        type: string
        format: "{SS}{7digits}"
        maps_to_epa_pwsid: true
      service_area:
        type: string
      city_name:
        type: string
      utility_name:
        type: string
      effective_date:
        type: integer
        description: "Year (XXXX) rates went into effect"
      rate_code:
        type: string
        enum: [water, sewer, septic, storm]
        description: "Must match service_type in metadata"
      bill_frequency:
        type: string
        enum: [monthly, bi-monthly, quarterly, annually, semi-annually]
      rate_type:
        type: string
        enum: [service_charge, commodity_charge_flat, commodity_charge_tier, commodity_charge_zone]
        description: |
          service_charge = fixed charge (often per meter size)
          commodity_charge_flat = uniform volumetric rate
          commodity_charge_tier = tiered rate with value_from/value_to breakpoints
          commodity_charge_zone = fixed charge based on property size range
          *_surcharge = various surcharges
      meter_size:
        type: float_or_na
        description: "Meter size in inches. 0.625 = typical residential (5/8 inch)"
      meter_unit:
        type: string
        description: "Almost always 'inch'"
      other_class:
        type: string
        description: "Sub-classification (gravity/pumped, elevation, inside/outside)"
      class_category:
        type: string
        description: "Category within classification"
      volumetric:
        type: string
        enum: ["yes", "no", "zone"]
        description: "Is the charge volume-based?"
      value_from:
        type: float_or_na
        description: "Start of volume range (in vol_unit). NA if not volumetric."
      value_to:
        type: float_or_na
        description: "End of volume range. 1000000000 = unlimited."
      vol_base:
        type: float_or_na
        description: "Volume unit for cost. Typically 1000 (gallons) or 100 (cubic feet)."
      vol_unit:
        type: string
        enum: [gallons, "cubic feet", "square feet", ERU, bedrooms, persons]
      cost:
        type: float
        description: "Price in USD"
      adjustment:
        type: float
        description: "Multiplier. Usually 1.0. 0.8/0.9/0.95 for wastewater % of water usage."
      notes:
        type: string
      update_bill:
        type: string
        description: "Internal flag: yes/no"

