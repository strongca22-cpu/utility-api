# Investor-Owned Utility Subsidiary Name Database
# Purpose: Maps local subsidiary names to parent company rate page URLs.
#          Used by iou_mapper.py for name-based matching beyond simple regex.
#
# Sources:
#   - American Water: SEC Exhibit 21 (2024 10-K), amwater.com/corp/About-Us
#   - Essential/Aqua: essential.co/about, Wikipedia, press releases
#   - SJW Group: sjwgroup.com/about-us, 2019 merger press releases
#   - CalWater: calwatergroup.com, calwater.com/about
#   - Others: Company websites, Wikipedia, public filings
#
# Created: 2026-03-25
# Modified: 2026-03-25
#
# Match types:
#   pattern: regex matched against SDWIS pws_name (existing Sprint 15 logic)
#   name: exact/fuzzy match against SDWIS pws_name (new Sprint 16 logic)
#
# IMPORTANT: Many entries are from publicly available sources but may be
# incomplete. Entries marked TODO need verification from SEC 10-K filings.

