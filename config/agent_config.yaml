# Agent Configuration
# Sprint 14: Thresholds for change detection, batch sizing, and freshness checking.
#
# Used by: OrchestratorAgent, ParseAgent (batch mode), SourceChecker
# Location: config/agent_config.yaml
# Created: 2026-03-25

change_detection:
  # Re-check active URLs older than this many days
  freshness_threshold_days: 90
  # Max change detection tasks per orchestrator cycle
  max_per_cycle: 20

batch_api:
  # Minimum parse tasks to justify batch submission (fewer = use live API)
  min_batch_size: 5
  # Max tasks per batch (Anthropic limit TBD, start conservative)
  max_batch_size: 100

source_checking:
  # Default interval between source freshness checks (days)
  default_interval_days: 90
  # HTTP request timeout for source checks (seconds)
  request_timeout: 30

scrape:
  # Max depth for multi-level deep crawl (1 = old behavior, 3 = default)
  # Level 1: broad navigation (water/utility/departments from homepage)
  # Level 2+: rate-focused (actual rate/fee schedule pages)
  deep_crawl_max_depth: 3

discovery:
  # Sprint 24: Serper.dev replaces SearXNG as the search backend.
  # Serper API key is in .env (SERPER_API_KEY). Never commit the key.
  search_backend: serper               # serper (active) | searxng (removed Sprint 24)
  queries_per_pwsid: 4                 # optimized for Google quality (was 7 for SearXNG)
  inter_query_delay: 0.2               # seconds between Serper queries (was 8 for SearXNG)
  delay_between_utilities: 2           # seconds between PWSIDs (was 15 for SearXNG)
  max_utilities_per_session: 100       # Serper can handle much higher throughput
  max_queries_per_run: 2500            # matches free tier cap
  url_score_threshold: 50              # minimum score to import to scrape_registry
  urls_per_pwsid: 3                    # top 3 with rank tagging (evaluate rank 2-3 value)
  gap_state_threshold_pct: 20          # states below this % coverage are targeted
  min_population: 3000                 # skip tiny systems
  search_cooldown_days: 30             # don't re-search within this window
