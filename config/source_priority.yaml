# Source Priority Configuration for Best-Estimate Rate Selection
#
# Purpose:
#   Controls how build_best_estimate selects the "best" rate record
#   when multiple sources exist for a single PWSID. Lower priority
#   number = higher preference.
#
#   Also controls display_tier — how each source appears in the dashboard.
#   This is the single source of truth for both selection priority and
#   dashboard tier assignment.
#
# display_tier values:
#   "premium"   — LLM-scraped rates (proprietary, blue in QA mode)
#   "free"      — Government/survey bulk data (green in dashboard)
#   "reference" — Academic/licensed data not for paid products (amber)
#
# Principle:
#   LLM-scraped rates from actual published rate schedules are the primary
#   source — most current (59% are 2024+), most complete (full tier structure,
#   fixed charges, rate type), and derived from the utility's own documents.
#   Government bulk and survey data serve as fallbacks for PWSIDs not yet
#   scraped, and as QA cross-references. Long-term: all bulk sources sunset
#   to QA/reference role as scraping coverage expands.
#
# Created: 2026-03-24
# Modified: 2026-04-02 — added display_tier; registered all known sources

# Default source priority (applies to all states unless overridden)
# Each entry maps a source key (or pattern) to a base priority number.
# Lower number = higher priority.
default:
  priority_order:
    # --- Primary: LLM scraping ---
    - source: "scraped_llm"
      priority: 1
      display_tier: "premium"
      notes: "Primary source. Low-confidence dynamically demoted to priority 6."

    # --- Government bulk: CA SWRCB eAR ---
    - source: "swrcb_ear_2022"
      priority: 3
      display_tier: "free"
      confidence: high
      notes: "CA eAR 2022. QA cross-reference for CA scraped rates."
    - source: "swrcb_ear_2021"
      priority: 4
      display_tier: "free"
      confidence: high
    - source: "swrcb_ear_2020"
      priority: 6
      display_tier: "free"
      confidence: medium
      notes: "No pre-computed bills, tier-only. Oldest CA government source."

    # --- Government bulk: EFC state surveys ---
